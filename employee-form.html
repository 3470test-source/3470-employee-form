<header class="employee-form-header">

    <!-- LOGO -->
    <div class="employee-form-header-logo">
        <img src="/image/Logo3470-health3-removebg-preview.png" alt="Company Logo">

        <h1>3470 Healthcare & Medical Coding Training Institute</h1>
        <p>Employee Joining Portal</p>

<!-- EMPLOYEE FORM CONTAINER -->
<div class="employee-form-container">

    <form id="multiStepForm">

        <!-- STEP 1 : PERSONAL DETAILS -->
        <div class="form-step active">
            <h2>1. Personal Details</h2>

            <div class="form-grid">

                <!-- Full Name -->
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" required>
                </div>

                <!-- Date of Birth -->
                <div class="input-group">
                    <label>Date of Birth</label>
                    <input type="date">
                </div>

                <!-- Gender -->
                <div class="input-group">
                    <label>Gender</label>
                    <select>
                        <option value="">-- Select Gender --</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Email Address -->
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email">
                </div>

                <!-- Mobile Number -->
                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="text">
                </div>

                <!-- Alternate Phone Number -->
                <div class="input-group">
                    <label>Alternate Phone Number</label>
                    <input type="text">
                </div>

                <!-- Current Address -->
                <div class="input-group full-width">
                    <label>Current Address</label>
                    <textarea rows="4"></textarea>
                </div>

                <!-- Permanent Address -->
                <div class="input-group full-width">
                    <label>Permanent Address</label>
                    <textarea rows="4"></textarea>
                </div>

                <!-- State -->
                <div class="input-group">
                    <label>State</label>
                        <select id="state" required>
                            <option value="">-- Select State --</option>
                            <option value="Tamil Nadu"> Tamil Nadu</option>
                            <option value="Karnataka"> Karnataka</option>
                            <option value="Telangana"> Telangana</option>
                            <option value="Maharashtra"> Maharashtra</option>
                            <option value="Delhi"> Delhi</option>
                        </select>
                    </div>

                <!-- City -->
                <div class="input-group">
                    <label>City</label>
                        <select id="city" required>
                            <option>-- Select City --</option>
                        </select>
                    </div>

                <!-- Pincode -->
                <div class="input-group">
                    <label>Pincode</label>
                    <input type="text">
                </div>

                <!-- Nationality -->
                <div class="input-group">
                    <label>Nationality</label>
                    <input type="text">
                </div>

            </div>

            <!-- Continue BUTTON -->
            <div class="btn-area">
                <button type="button" class="next-btn"> Continue</button>
            </div>

        </div>

<!-- Javascript -->
<script src="/js/script.js" defer></script>



<script>

const steps =
document.querySelectorAll(".form-step");

let currentStep = 0;


/* NEXT BUTTON */

document.querySelector(".next-btn")
.addEventListener("click",()=>{

    steps[currentStep]
    .classList.remove("active");

    currentStep++;

    steps[currentStep]
    .classList.add("active");

});


/* PREVIOUS BUTTON */

document.querySelector(".prev-btn")
.addEventListener("click",()=>{

    steps[currentStep]
    .classList.remove("active");

    currentStep--;

    steps[currentStep]
    .classList.add("active");

});


/* FINAL SUBMIT */

document.getElementById("multiStepForm")
.addEventListener("submit",(e)=>{

    e.preventDefault();

    alert("Employee Form Submitted Successfully");

});

</script>
